openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Forex Trading Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pairs
    description: Forex pairs monitoring
  - name: zones
    description: Support and Resistance zones
  - name: alerts
    description: Zone alerts
  - name: calendar
    description: Economic calendar

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pairs:
    get:
      operationId: getPairs
      tags: [pairs]
      summary: Get all monitored forex pairs with current price and zone status
      responses:
        "200":
          description: List of pairs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PairSummary"

  /pairs/{symbol}:
    get:
      operationId: getPairDetail
      tags: [pairs]
      summary: Get detailed data for a specific pair including candles and S&R zones
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pair detail with candles and zones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairDetail"
        "404":
          description: Pair not found

  /zones:
    get:
      operationId: getZones
      tags: [zones]
      summary: Get all active S&R zones across all pairs
      responses:
        "200":
          description: All active zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneInfo"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get pairs where price is currently inside or very near a S&R zone
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /market-summary:
    get:
      operationId: getMarketSummary
      tags: [pairs]
      summary: Get overall market summary — how many pairs are in zones, session info
      responses:
        "200":
          description: Market summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummary"

  /calendar:
    get:
      operationId: getCalendar
      tags: [calendar]
      summary: Get this week's high-impact economic events for our currency pairs
      responses:
        "200":
          description: Economic calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PairSummary:
      type: object
      required:
        - symbol
        - displayName
        - currentPrice
        - bid
        - ask
        - change
        - changePct
        - zoneStatus
        - signal
        - updatedAt
      properties:
        symbol:
          type: string
          description: "e.g. GBPUSD"
        displayName:
          type: string
          description: "e.g. GBP/USD"
        currentPrice:
          type: number
        bid:
          type: number
        ask:
          type: number
        change:
          type: number
        changePct:
          type: number
        zoneStatus:
          type: string
          enum: [neutral, resistance, support, near_resistance, near_support]
        signal:
          type: string
          enum: [none, short, long]
        nearestResistance:
          type: ["number", "null"]
        nearestSupport:
          type: ["number", "null"]
        distanceToNearestZonePct:
          type: ["number", "null"]
        pattern:
          type: string
          enum: [none, pin_bar_bullish, pin_bar_bearish, engulfing_bullish, engulfing_bearish, doji_bearish, doji_bullish, doji]
        adrPips:
          type: ["number", "null"]
        todayRangePips:
          type: ["number", "null"]
        adrPercent:
          type: ["number", "null"]
        adrRisk:
          type: string
          enum: [low, medium, high, very_high, unknown]
        dailyBias:
          type: string
          enum: [bullish, bearish, neutral]
        ema50:
          type: ["number", "null"]
        ema200:
          type: ["number", "null"]
        trend:
          type: string
          enum: [up, down, range]
        updatedAt:
          type: string

    Candle:
      type: object
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume
      properties:
        timestamp:
          type: integer
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    FairValueGap:
      type: object
      required:
        - top
        - bottom
        - isBullish
        - timestamp
        - filled
      properties:
        top:
          type: number
        bottom:
          type: number
        isBullish:
          type: boolean
        timestamp:
          type: integer
        filled:
          type: boolean

    MarketStructureInfo:
      type: object
      required:
        - trend
      properties:
        trend:
          type: string
          enum: [up, down, range]
        lastSwingHigh:
          type: ["number", "null"]
        lastSwingLow:
          type: ["number", "null"]
        bos:
          type: ["object", "null"]
          properties:
            price:
              type: number
            direction:
              type: string
              enum: [up, down]
            timestamp:
              type: integer
        choch:
          type: ["object", "null"]
          properties:
            price:
              type: number
            direction:
              type: string
              enum: [up, down]
            timestamp:
              type: integer

    VpBin:
      type: object
      required:
        - priceMid
        - normalizedVol
        - isPoc
        - isValueArea
      properties:
        priceMid:
          type: number
        normalizedVol:
          type: number
        isPoc:
          type: boolean
        isValueArea:
          type: boolean

    VolumeProfile:
      type: object
      required:
        - poc
        - vah
        - val
        - bins
      properties:
        poc:
          type: number
          description: "Point of Control — price level with highest volume"
        vah:
          type: number
          description: "Value Area High (70% of volume)"
        val:
          type: number
          description: "Value Area Low (70% of volume)"
        bins:
          type: array
          items:
            $ref: "#/components/schemas/VpBin"

    OrderBlock:
      type: object
      required:
        - top
        - bot
        - isBullish
        - timestamp
        - mitigated
      properties:
        top:
          type: number
        bot:
          type: number
        isBullish:
          type: boolean
          description: "Bullish OB = potential buy zone; Bearish OB = potential sell zone"
        timestamp:
          type: integer
        mitigated:
          type: boolean
          description: "True if price has already returned through the OB"

    LiquidityGrab:
      type: object
      required:
        - price
        - isBuySide
        - timestamp
        - wickExtent
      properties:
        price:
          type: number
          description: "The swing level that was swept"
        isBuySide:
          type: boolean
          description: "True = buy-side liquidity was grabbed (wick above swing high)"
        timestamp:
          type: integer
        wickExtent:
          type: number

    Zone:
      type: object
      required:
        - top
        - bot
        - center
        - isResistance
        - touches
        - strength
        - rating
        - htfConfluence
      properties:
        top:
          type: number
        bot:
          type: number
        center:
          type: number
        isResistance:
          type: boolean
        touches:
          type: integer
        strength:
          type: number
        volSum:
          type: ["number", "null"]
        firstBar:
          type: integer
        lastTouch:
          type: integer
        rating:
          type: integer
        htfConfluence:
          type: boolean
        htfLevel:
          type: string
          enum: [none, H1, H4, H1_H4]
        probabilityScore:
          type: ["integer", "null"]
        nearRoundNumber:
          type: ["boolean", "null"]
        ageBars:
          type: ["integer", "null"]

    PairDetail:
      type: object
      required:
        - symbol
        - displayName
        - currentPrice
        - bid
        - ask
        - change
        - changePct
        - zoneStatus
        - signal
        - candles
        - resistanceZones
        - supportZones
        - updatedAt
      properties:
        symbol:
          type: string
        displayName:
          type: string
        currentPrice:
          type: number
        bid:
          type: number
        ask:
          type: number
        change:
          type: number
        changePct:
          type: number
        zoneStatus:
          type: string
          enum: [neutral, resistance, support, near_resistance, near_support]
        signal:
          type: string
          enum: [none, short, long]
        pattern:
          type: string
          enum: [none, pin_bar_bullish, pin_bar_bearish, engulfing_bullish, engulfing_bearish, doji_bearish, doji_bullish, doji]
        nearestResistance:
          type: ["number", "null"]
        nearestSupport:
          type: ["number", "null"]
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        resistanceZones:
          type: array
          items:
            $ref: "#/components/schemas/Zone"
        supportZones:
          type: array
          items:
            $ref: "#/components/schemas/Zone"
        adrPips:
          type: ["number", "null"]
        todayRangePips:
          type: ["number", "null"]
        adrPercent:
          type: ["number", "null"]
        adrRisk:
          type: string
          enum: [low, medium, high, very_high, unknown]
        dailyBias:
          type: string
          enum: [bullish, bearish, neutral]
        ema50:
          type: ["number", "null"]
        ema200:
          type: ["number", "null"]
        ema50Values:
          type: array
          items:
            type: number
        ema200Values:
          type: array
          items:
            type: number
        trend:
          type: string
          enum: [up, down, range]
        fairValueGaps:
          type: array
          items:
            $ref: "#/components/schemas/FairValueGap"
        marketStructure:
          $ref: "#/components/schemas/MarketStructureInfo"
        psychologicalLevels:
          type: array
          items:
            type: number
        volumeProfile:
          $ref: "#/components/schemas/VolumeProfile"
        orderBlocks:
          type: array
          items:
            $ref: "#/components/schemas/OrderBlock"
        liquidityGrabs:
          type: array
          items:
            $ref: "#/components/schemas/LiquidityGrab"
        updatedAt:
          type: string

    ZoneInfo:
      type: object
      required:
        - symbol
        - displayName
        - zone
        - priceInZone
        - distancePct
      properties:
        symbol:
          type: string
        displayName:
          type: string
        zone:
          $ref: "#/components/schemas/Zone"
        priceInZone:
          type: boolean
        distancePct:
          type: number

    Alert:
      type: object
      required:
        - symbol
        - displayName
        - signal
        - zoneStatus
        - currentPrice
        - zoneTop
        - zoneBot
        - zoneCenter
        - strength
        - message
        - triggeredAt
      properties:
        symbol:
          type: string
        displayName:
          type: string
        signal:
          type: string
          enum: [short, long]
        zoneStatus:
          type: string
          enum: [resistance, support]
        currentPrice:
          type: number
        zoneTop:
          type: number
        zoneBot:
          type: number
        zoneCenter:
          type: number
        strength:
          type: number
        touches:
          type: integer
        message:
          type: string
        triggeredAt:
          type: string

    MarketSummary:
      type: object
      required:
        - totalPairs
        - pairsInResistance
        - pairsInSupport
        - pairsNearZone
        - activeAlerts
        - session
        - sessionTime
      properties:
        totalPairs:
          type: integer
        pairsInResistance:
          type: integer
        pairsInSupport:
          type: integer
        pairsNearZone:
          type: integer
        activeAlerts:
          type: integer
        session:
          type: string
          enum: [Sydney, Tokyo, London, New_York, Overlap_London_NY, Overlap_Tokyo_London, Closed]
        sessionTime:
          type: string
        isKillZone:
          type: boolean
        killZoneName:
          type: ["string", "null"]
        dayOfWeek:
          type: integer
        dayWarning:
          type: ["string", "null"]

    CalendarEvent:
      type: object
      required:
        - title
        - country
        - date
        - impact
      properties:
        title:
          type: string
        country:
          type: string
          description: "Currency code e.g. USD, GBP"
        date:
          type: string
          description: "ISO datetime string"
        impact:
          type: string
          enum: [High, Medium, Low, Holiday, Non-Economic]
        forecast:
          type: string
        previous:
          type: string
        actual:
          type: string
